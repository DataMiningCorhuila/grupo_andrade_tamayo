services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-simpsons_db}
      POSTGRES_USER: ${DB_USER:-simpsons_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-simpsons_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-simpsons_user} -d ${DB_NAME:-simpsons_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  extractor:
    build: .
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    command: python scripts/extractor.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    profiles:
      - extract

  streamlit:
    build: .
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
